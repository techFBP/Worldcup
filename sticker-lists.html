<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚽ My Sticker Album · World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #22c55e; --green-dark: #16a34a; --green-light: #dcfce7;
    --yellow: #fbbf24; --yellow-light: #fef9c3;
    --red: #ef4444; --red-light: #fee2e2;
    --blue: #3b82f6; --blue-light: #dbeafe;
    --purple: #a855f7; --purple-light: #f3e8ff;
    --bg: #f0fdf4;
    --card: #ffffff;
    --text: #14532d;
    --muted: #86efac;
    --border: #bbf7d0;
    --radius: 16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 10%, #dcfce7 0%, transparent 50%),
                      radial-gradient(circle at 80% 90%, #fef9c3 0%, transparent 50%);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #16a34a 0%, #15803d 50%, #166534 100%);
    padding: 28px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header-ball { font-size: 52px; display: block; margin-bottom: 8px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .header-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 7vw, 48px);
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 0 3px 12px rgba(0,0,0,.25);
    margin-bottom: 4px;
  }
  .header-sub { color: #bbf7d0; font-size: 14px; font-weight: 600; letter-spacing: .05em; margin-bottom: 20px; }

  /* Stats pills */
  .stats-row {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 0;
  }
  .stat-pill {
    background: rgba(255,255,255,.15);
    border: 2px solid rgba(255,255,255,.3);
    border-radius: 40px;
    padding: 8px 18px;
    display: flex; align-items: center; gap: 8px;
    color: #fff;
  }
  .stat-pill-num { font-family: 'Fredoka One', cursive; font-size: 22px; line-height: 1; }
  .stat-pill-lbl { font-size: 12px; font-weight: 700; opacity: .85; text-transform: uppercase; letter-spacing: .06em; }

  /* Progress bar */
  .progress-outer {
    background: rgba(0,0,0,.2);
    border-radius: 40px;
    height: 12px;
    margin: 20px 24px 0;
    overflow: hidden;
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    border-radius: 40px;
    transition: width 1s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .progress-inner::after {
    content: '';
    position: absolute; top: 2px; left: 8px; right: 8px; height: 4px;
    background: rgba(255,255,255,.4); border-radius: 40px;
  }

  /* ── Tabs ── */
  .tabs-wrap {
    display: flex; justify-content: center; gap: 10px;
    padding: 20px 20px 0;
  }
  .tab-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    padding: 10px 24px; border-radius: 40px;
    border: 3px solid transparent;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 7px;
  }
  .tab-btn.miss  { background: var(--red-light); color: var(--red); border-color: #fca5a5; }
  .tab-btn.dups  { background: var(--yellow-light); color: #b45309; border-color: #fcd34d; }
  .tab-btn.miss.active  { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 4px 14px rgba(239,68,68,.4); }
  .tab-btn.dups.active  { background: var(--yellow); color: #78350f; border-color: var(--yellow); box-shadow: 0 4px 14px rgba(251,191,36,.4); }
  .tab-btn .tab-count {
    background: rgba(0,0,0,.15); color: inherit;
    border-radius: 20px; padding: 1px 8px; font-size: 12px;
  }
  .tab-btn.active .tab-count { background: rgba(255,255,255,.25); }

  /* ── Filter / search bar ── */
  .filter-bar {
    padding: 16px 20px 0;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border-radius: 40px;
    border: 3px solid var(--border);
    background: var(--card);
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 600; color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
  .search-wrap .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-size: 16px; pointer-events: none;
  }
  .filter-clear {
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    padding: 10px 18px; border-radius: 40px; border: 3px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer;
    transition: all .15s;
  }
  .filter-clear:hover { border-color: var(--green); color: var(--green-dark); }

  /* ── Save button ── */
  .save-bar {
    padding: 12px 20px 0;
    display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap;
  }
  .save-btn {
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
    padding: 9px 18px; border-radius: 40px; cursor: pointer; border: 3px solid transparent;
    display: flex; align-items: center; gap: 6px; transition: all .15s;
  }
  .save-btn.confirm { background: var(--green); color: #fff; border-color: var(--green-dark); box-shadow: 0 3px 10px rgba(34,197,94,.35); }
  .save-btn.confirm:hover { background: var(--green-dark); }
  .save-btn.discard { background: var(--card); color: var(--muted); border-color: var(--border); }
  .save-btn.discard:hover { border-color: var(--red); color: var(--red); }
  .pending-label { font-size: 12px; font-weight: 700; color: var(--green-dark); align-self: center; background: var(--green-light); padding: 5px 12px; border-radius: 20px; }
  .save-bar.hidden { display: none; }

  /* ── Content ── */
  .content { padding: 16px 20px 80px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Country card */
  .country-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 3px solid var(--border);
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .country-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.08); }

  .country-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    cursor: pointer; user-select: none;
  }
  .country-flag { font-size: 26px; flex-shrink: 0; }
  .country-info { flex: 1; }
  .country-name-text { font-weight: 800; font-size: 15px; }
  .country-code-text { font-size: 11px; font-weight: 600; color: #86efac; letter-spacing: .07em; }
  .country-pill {
    font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 20px;
    flex-shrink: 0;
  }
  .country-pill.miss { background: var(--red-light); color: var(--red); }
  .country-pill.dup  { background: var(--yellow-light); color: #b45309; }
  .country-pill.done { background: var(--green-light); color: var(--green-dark); }
  .country-chevron { font-size: 16px; transition: transform .25s; flex-shrink: 0; }
  .country-card.open .country-chevron { transform: rotate(180deg); }

  .country-body {
    display: none;
    padding: 4px 16px 16px;
    border-top: 2px solid var(--border);
  }
  .country-card.open .country-body { display: block; }

  /* Chip grid */
  .chip-grid { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 12px; }
  .sticker-chip {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 12px; font-weight: 800;
    padding: 6px 10px; cursor: pointer; position: relative;
    border: 3px solid transparent;
    transition: transform .15s, box-shadow .15s, background .15s, border-color .15s;
    user-select: none;
  }
  .sticker-chip:hover { transform: scale(1.08); }
  .sticker-chip:active { transform: scale(.96); }

  /* Missing */
  .sticker-chip.miss {
    background: var(--red-light); color: var(--red); border-color: #fca5a5;
  }
  /* Got it (toggled on missing chip) */
  .sticker-chip.miss.got {
    background: var(--green-light); color: var(--green-dark); border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(34,197,94,.25);
  }
  .sticker-chip.miss.got::after { content: '✓'; position: absolute; top: -6px; right: -6px; background: var(--green); color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }

  /* Duplicate */
  .sticker-chip.dup {
    background: var(--yellow-light); color: #92400e; border-color: #fcd34d;
  }
  /* Traded (toggled on dup chip) */
  .sticker-chip.dup.traded {
    background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0;
  }
  .sticker-chip.dup.traded::after { content: '✕'; position: absolute; top: -6px; right: -6px; background: #94a3b8; color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }

  .dup-badge {
    position: absolute; top: -7px; right: -7px;
    background: #f59e0b; color: #fff; border-radius: 20px;
    font-size: 9px; font-weight: 900; padding: 1px 5px;
    border: 2px solid #fff; line-height: 1.4;
  }
  .sticker-chip.traded .dup-badge { display: none; }

  /* No results */
  .no-results {
    text-align: center; padding: 48px 20px;
    color: #86efac; font-size: 16px; font-weight: 700;
  }
  .no-results .emoji { font-size: 48px; display: block; margin-bottom: 10px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #14532d; color: #fff;
    padding: 12px 24px; border-radius: 40px;
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .stat-pill-num { font-size: 18px; }
    .stats-row { gap: 6px; }
  }
</style>
</head>

<header>
  <span class="header-ball">⚽</span>
  <div class="header-title">My Sticker Album</div>
  <div class="header-sub">Panini · FIFA World Cup 2026 · SA26</div>
  <div class="stats-row">
    <div class="stat-pill">
      <span class="stat-pill-num" id="s-owned">–</span>
      <span class="stat-pill-lbl">✅ Owned</span>

    <div class="stat-pill">

<div class="tabs-wrap">
  <button class="tab-btn miss active">

  <button class="tab-btn dups">

<div class="filter-bar">
  <div class="search-wrap">

<div class="save-bar hidden" id="save-bar">

    [281,300,'Paraguay','PAR','\u{1F1F5}\u{1F1FE}'],
    [601,620,'Portugal','POR','\u{1F1F5}\u{1F1F9}'],
    [141,160,'Qatar','QAT','\u{1F1F6}\u{1F1E6}'],
    [721,740,'Saudi Arabia','SAU','\u{1F1F8}\u{1F1E6}'],
    [241,260,'Scotland','SCO','\u{1F3F4}'],
    [681,700,'Senegal','SEN','\u{1F1F8}\u{1F1F3}'],
    [41,60,'South Africa','RSA','\u{1F1FF}\u{1F1E6}'],
    [61,80,'South Korea','KOR','\u{1F1F0}\u{1F1F7}'],
    [461,480,'Sweden','SWE','\u{1F1F8}\u{1F1EA}'],
    [161,180,'Switzerland','SUI','\u{1F1E8}\u{1F1ED}'],
    [961,980,'Thailand','THA','\u{1F1F9}\u{1F1ED}'],
    [321,340,'Turkiye','TUR','\u{1F1F9}\u{1F1F7}'],
    [261,280,'USA','USA','\u{1F1FA}\u{1F1F8}'],
    [621,640,'Uruguay','URU','\u{1F1FA}\u{1F1FE}'],
    [921,940,'Venezuela','VEN','\u{1F1FB}\u{1F1EA}'],
    [501,520,'Argentina','ARG','\u{1F1E6}\u{1F1F7}']
  ].sort(function(a,b){ return a[2].localeCompare(b[2]); });

  function expandRanges(str) {
    var s = new Set();
    str.split(',').forEach(function(p) {
      if (p.indexOf('-') > -1) {
        var parts = p.split('-'); var a = +parts[0]; var b = +parts[1];
        for (var i=a; i<=b; i++) s.add(i);
      } else { s.add(+p); }
    });
    return s;
  }

  function parseDups(str) {
    var d = {};
    str.split(',').forEach(function(item) {
      var p = item.split(':'); d[+p[0]] = +p[1];
    });
    return d;
  }

  function getSection(n) {
    for (var i=0; i<SECTIONS.length; i++) {
      if (n >= SECTIONS[i][0] && n <= SECTIONS[i][1]) return SECTIONS[i];
    }
    return [n, n, 'Unknown', '?', '?'];
  }

  var owned = expandRanges(OWNED_STR);
  var dupsBase = parseDups(DUPS_STR);
  var gotSet = new Set();
  var tradedSet = new Set();
  var missingNums = [];
  var dupNums = [];

  function recompute() {
    missingNums = [];
    for (var i=1; i<=TOTAL; i++) if (!owned.has(i)) missingNums.push(i);
    dupNums = Object.keys(dupsBase).map(Number).sort(function(a,b){return a-b;});
  }
  recompute();

  function updateStats() {
    var totalMiss = missingNums.length - gotSet.size;
    var totalDupCopies = Object.values(dupsBase).reduce(function(a,b){return a+b;},0) - tradedSet.size;
    var activeDupNums = dupNums.filter(function(n){return !tradedSet.has(n);}).length;
    var pct = Math.round((owned.size + gotSet.size) / TOTAL * 100);
    document.getElementById('s-owned').textContent = owned.size + gotSet.size;
    document.getElementById('s-missing').textContent = totalMiss;
    document.getElementById('s-dups').textContent = totalDupCopies;
    document.getElementById('prog').style.width = pct + '%';
    document.getElementById('tab-miss-cnt').textContent = totalMiss;
    document.getElementById('tab-dup-cnt').textContent = activeDupNums;
    var pending = gotSet.size + tradedSet.size;
    var bar = document.getElementById('save-bar');
    if (pending > 0) {
      bar.classList.remove('hidden');
      document.getElementById('pending-label').textContent = pending + ' change' + (pending>1?'s':'') + ' pending';
    } else {
      bar.classList.add('hidden');
    }
  }

  function groupBySection(numArr) {
    var map = {};
    var order = [];
    numArr.forEach(function(n) {
      var sec = getSection(n);
      var key = sec[2];
      if (!map[key]) { map[key] = { sec: sec, list: [] }; order.push(key); }
      map[key].list.push(n);
    });
    return order.sort(function(a,b){return a.localeCompare(b);}).map(function(k){return map[k];});
  }

  function makeChip(n, type, sec) {
    var pos = String(n - sec[0] + 1).padStart(2,'0');
    var chip = document.createElement('div');
    if (type === 'miss') {
      chip.className = 'sticker-chip miss' + (gotSet.has(n) ? ' got' : '');
      chip.textContent = sec[3] + ' ' + pos;
      chip.addEventListener('click', function(){ toggleGot(this, n, sec); });
    } else {
      var copies = (dupsBase[n] || 0) + 1;
      var traded = tradedSet.has(n);
      chip.className = 'sticker-chip dup' + (traded ? ' traded' : '');
      chip.textContent = sec[3] + ' ' + pos;
      if (!traded) {
        var badge = document.createElement('span');
        badge.className = 'dup-badge';
        badge.textContent = 'x' + copies;
        chip.appendChild(badge);
      }
      chip.addEventListener('click', function(){ toggleTraded(this, n, sec); });
    }
    return chip;
  }

  function buildSection(container, groups, type) {
    container.innerHTML = '';
    if (!groups.length) {
      container.innerHTML = '<div class="no-results"><span class="emoji">' + (type==='miss'?'🎉':'🤝') + '</span>Nothing here!</div>';
      return;
    }
    groups.forEach(function(g) {
      var sec = g.sec; var numList = g.list;
      var sStart=sec[0], sEnd=sec[1], sName=sec[2], sCode=sec[3], sFlag=sec[4];
      var secTotal = sEnd - sStart + 1;
      var ownedCount = 0;
      for (var i=sStart; i<=sEnd; i++) if (owned.has(i)) ownedCount++;

      var card = document.createElement('div');
      card.className = 'country-card';
      card.dataset.country = sName.toLowerCase();

      var isComplete, pillCls, pillTxt;
      if (type === 'miss') {
        isComplete = numList.every(function(n){return gotSet.has(n);});
        pillCls = isComplete ? 'done' : 'miss';
        pillTxt = isComplete ? 'Complete!' : numList.filter(function(n){return !gotSet.has(n);}).length + ' missing';
      } else {
        isComplete = numList.every(function(n){return tradedSet.has(n);});
        pillCls = isComplete ? 'done' : 'dup';
        pillTxt = isComplete ? 'All traded!' : numList.filter(function(n){return !tradedSet.has(n);}).length + ' available';
      }

      var head = document.createElement('div');
      head.className = 'country-head';
      head.innerHTML = '<span class="country-flag">' + sFlag + '</span>' +
        '<div class="country-info"><div class="country-name-text">' + sName + '</div>' +
        '<div class="country-code-text">' + sCode + ' &middot; ' + ownedCount + '/' + secTotal + ' owned</div></div>' +
        '<span class="country-pill ' + pillCls + '" data-pill>' + pillTxt + '</span>' +
        '<span class="country-chevron">&#9660;</span>';
      head.addEventListener('click', function() { card.classList.toggle('open'); });

      var body = document.createElement('div');
      body.className = 'country-body';
      var grid = document.createElement('div');
      grid.className = 'chip-grid';
      numList.forEach(function(n) { grid.appendChild(makeChip(n, type, sec)); });
      body.appendChild(grid);

      card.appendChild(head);
      card.appendChild(body);
      container.appendChild(card);
    });
  }

  function rebuildAll() {
    buildSection(document.getElementById('sections-missing'), groupBySection(missingNums), 'miss');
    buildSection(document.getElementById('sections-dups'), groupBySection(dupNums), 'dup');
    updateStats();
    applyFilter();
  }

  function updatePill(chip, type) {
    var card = chip.closest('.country-card');
    var pill = card.querySelector('[data-pill]');
    var chips = Array.from(card.querySelectorAll('.sticker-chip'));
    if (type === 'miss') {
      var notGot = chips.filter(function(c){return !c.classList.contains('got');}).length;
      pill.className = 'country-pill ' + (notGot===0 ? 'done' : 'miss');
      pill.textContent = notGot===0 ? 'Complete!' : notGot + ' missing';
    } else {
      var notTraded = chips.filter(function(c){return !c.classList.contains('traded');}).length;
      pill.className = 'country-pill ' + (notTraded===0 ? 'done' : 'dup');
      pill.textContent = notTraded===0 ? 'All traded!' : notTraded + ' available';
    }
  }

  function toggleGot(chip, n, sec) {
    if (gotSet.has(n)) { gotSet.delete(n); chip.classList.remove('got'); }
    else { gotSet.add(n); chip.classList.add('got'); }
    updatePill(chip, 'miss');
    updateStats();
  }

  function toggleTraded(chip, n, sec) {
    if (tradedSet.has(n)) {
      tradedSet.delete(n); chip.classList.remove('traded');
      var copies = (dupsBase[n]||0) + 1;
      if (!chip.querySelector('.dup-badge')) {
        var b = document.createElement('span');
        b.className = 'dup-badge'; b.textContent = 'x' + copies;
        chip.appendChild(b);
      }
    } else {
      tradedSet.add(n); chip.classList.add('traded');
      var b2 = chip.querySelector('.dup-badge');
      if (b2) b2.remove();
    }
    updatePill(chip, 'dup');
    updateStats();
  }

  // Expose globals for inline HTML handlers
  window.applyFilter = function() {
    var val = document.getElementById('filter-input').value.toLowerCase().trim();
    Array.from(document.querySelectorAll('.country-card')).forEach(function(c) {
      c.style.display = (!val || c.dataset.country.indexOf(val) > -1) ? '' : 'none';
    });
  };
  window.clearFilter = function() {
    document.getElementById('filter-input').value = '';
    window.applyFilter();
  };
  function applyFilter() { window.applyFilter(); }

  window.confirmChanges = function() {
    gotSet.forEach(function(n){ owned.add(n); });
    tradedSet.forEach(function(n){ delete dupsBase[n]; });
    gotSet.clear(); tradedSet.clear();
    recompute(); rebuildAll();
    showToast('Changes saved!');
  };
  window.discardChanges = function() {
    gotSet.clear(); tradedSet.clear();
    recompute(); rebuildAll();
    showToast('Changes discarded');
  };

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }

  // Tabs
  var currentTab = 'missing';
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('panel-missing').style.display = tab==='missing' ? 'block' : 'none';
    document.getElementById('panel-dups').style.display    = tab==='dups'    ? 'block' : 'none';
    Array.from(document.querySelectorAll('.tab-btn')).forEach(function(b){ b.classList.remove('active'); });
    document.querySelector(tab==='missing' ? '.tab-btn.miss' : '.tab-btn.dups').classList.add('active');
    history.replaceState(null, '', '#' + tab);
  }

  document.querySelector('.tab-btn.miss').addEventListener('click', function(){ switchTab('missing'); });
  document.querySelector('.tab-btn.dups').addEventListener('click', function(){ switchTab('dups'); });

  document.getElementById('panel-missing').style.display = 'block';
  document.getElementById('panel-dups').style.display    = 'none';

  rebuildAll();

  if (window.location.hash === '#dups') switchTab('dups');

})();
</script>
</body>
