<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚽ Sebas Sticker Album · FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #E4002B; --red-dark: #b5001f; --red-light: rgba(228,0,43,0.09);
    --gold: #C8881A; --gold-light: rgba(200,136,26,0.12);
    --bg: #f5f5f0; --card: #ffffff; --border: #e8e4df; --border-strong: #d4cfc8;
    --text: #1a1a1a; --text-muted: #888580; --text-subtle: #b0aca6;
    --green: #007a3d; --green-light: rgba(0,122,61,0.1);
    --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 10% 0%, rgba(228,0,43,0.04) 0%, transparent 50%),
                      radial-gradient(ellipse at 90% 100%, rgba(200,136,26,0.05) 0%, transparent 50%);
    font-family: 'Nunito', sans-serif; color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  header {
    background: linear-gradient(160deg, #ffffff 0%, #faf8f5 100%);
    border-bottom: 3px solid var(--red); padding: 32px 24px 28px; text-align: center; position: relative; overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }
  header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(228,0,43,0.018) 40px,rgba(228,0,43,0.018) 41px); pointer-events: none; }
  header::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .header-eyebrow { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: .2em; color: var(--red); margin-bottom: 6px; }
  .header-ball { font-size: 48px; display: block; margin-bottom: 6px; animation: bounce 2.5s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 9vw, 62px); color: var(--text); letter-spacing: 3px; line-height: 1; margin-bottom: 4px; }
  .header-title span { color: var(--red); }
  .header-sub { color: var(--gold); font-size: 12px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 24px; opacity: 0.85; }
  .stats-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .stat-pill-num { font-family: 'Bebas Neue', sans-serif; font-size: 26px; line-height: 1; color: var(--red); }
  .stat-pill-lbl { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
  .progress-outer { background: var(--border); border-radius: 4px; height: 6px; margin: 20px 24px 0; overflow: hidden; }
  .progress-inner { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); border-radius: 4px; transition: width 1s cubic-bezier(.4,0,.2,1); }
  .tabs-wrap { display: flex; justify-content: center; gap: 8px; padding: 20px 20px 0; }
  .tab-btn { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; padding: 10px 24px; border-radius: 6px; border: 2px solid var(--border); background: var(--card); color: var(--text-muted); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 7px; text-transform: uppercase; letter-spacing: .06em; }
  .tab-btn.miss.active { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 4px 16px rgba(228,0,43,0.3); }
  .tab-btn.dups.active { background: var(--gold); border-color: var(--gold); color: #fff; box-shadow: 0 4px 16px rgba(200,136,26,0.3); }
  .tab-btn:not(.active):hover { border-color: var(--border-strong); color: var(--text); }
  .tab-btn .tab-count { background: rgba(0,0,0,.1); border-radius: 4px; padding: 1px 7px; font-size: 11px; }
  .filter-bar { padding: 14px 20px 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-wrap input { width: 100%; padding: 10px 14px 10px 38px; border-radius: 6px; border: 2px solid var(--border); background: var(--card); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; }
  .search-wrap input::placeholder { color: var(--text-subtle); }
  .search-wrap input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(228,0,43,0.1); }
  .search-wrap .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; opacity: .5; }
  .filter-clear { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; padding: 10px 18px; border-radius: 6px; border: 2px solid var(--border); background: var(--card); color: var(--text-muted); cursor: pointer; transition: all .15s; text-transform: uppercase; }
  .filter-clear:hover { border-color: var(--red); color: var(--red); }
  .save-bar { padding: 12px 20px 0; display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
  .save-btn { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; padding: 9px 18px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; gap: 6px; transition: all .15s; text-transform: uppercase; letter-spacing: .06em; }
  .save-btn.confirm { background: var(--green); color: #fff; border-color: var(--green); box-shadow: 0 3px 10px rgba(0,122,61,.25); }
  .save-btn.confirm:hover { filter: brightness(1.08); }
  .save-btn.discard { background: var(--card); color: var(--text-muted); border-color: var(--border); }
  .save-btn.discard:hover { border-color: var(--red); color: var(--red); }
  .pending-label { font-size: 12px; font-weight: 700; color: var(--gold); align-self: center; background: var(--gold-light); padding: 5px 12px; border-radius: 4px; }
  .save-bar.hidden { display: none; }
  .content { padding: 16px 20px 80px; }
  .panel { display: none; } .panel.active { display: block; }
  .country-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; transition: border-color .2s, box-shadow .2s; }
  .country-card:hover { border-color: var(--border-strong); box-shadow: 0 4px 16px rgba(0,0,0,.07); }
  .country-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .country-flag { font-size: 24px; flex-shrink: 0; }
  .country-info { flex: 1; }
  .country-name-text { font-weight: 800; font-size: 14px; color: var(--text); }
  .country-code-text { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .07em; margin-top: 1px; }
  .country-pill { font-size: 11px; font-weight: 800; padding: 4px 11px; border-radius: 4px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .06em; }
  .country-pill.miss { background: var(--red-light); color: var(--red); }
  .country-pill.dup  { background: var(--gold-light); color: var(--gold); }
  .country-pill.done { background: var(--green-light); color: var(--green); }
  .country-chevron { font-size: 14px; transition: transform .25s; flex-shrink: 0; opacity: .4; }
  .country-card.open .country-chevron { transform: rotate(180deg); }
  .country-body { display: none; padding: 4px 16px 16px; border-top: 1px solid var(--border); background: #fafaf8; }
  .country-card.open .country-body { display: block; }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 12px; }
  .sticker-chip { display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; font-weight: 800; padding: 6px 10px; cursor: pointer; position: relative; border: 2px solid transparent; transition: transform .15s, box-shadow .15s, background .15s, border-color .15s; user-select: none; text-transform: uppercase; letter-spacing: .04em; }
  .sticker-chip:hover { transform: scale(1.08); } .sticker-chip:active { transform: scale(.96); }
  .sticker-chip.miss { background: var(--red-light); color: var(--red); border-color: rgba(228,0,43,0.3); }
  .sticker-chip.miss.got { background: var(--green-light); color: var(--green); border-color: var(--green); box-shadow: 0 0 0 2px rgba(0,196,106,.2); }
  .sticker-chip.miss.got::after { content: '✓'; position: absolute; top: -6px; right: -6px; background: var(--green); color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
  .sticker-chip.dup { background: var(--gold-light); color: var(--gold); border-color: rgba(200,136,26,0.25); }
  .sticker-chip.dup.traded { background: #f0eeeb; color: var(--text-subtle); border-color: var(--border); }
  .sticker-chip.dup.traded::after { content: '✕'; position: absolute; top: -6px; right: -6px; background: var(--text-subtle); color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }
  .dup-badge { position: absolute; top: -7px; right: -7px; background: var(--gold); color: #fff; border-radius: 4px; font-size: 9px; font-weight: 900; padding: 1px 5px; border: 2px solid var(--bg); line-height: 1.4; }
  .sticker-chip.traded .dup-badge { display: none; }
  .no-results { text-align: center; padding: 48px 20px; color: var(--text-subtle); font-size: 16px; font-weight: 700; }
  .no-results .emoji { font-size: 48px; display: block; margin-bottom: 10px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 12px 24px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; box-shadow: 0 8px 32px rgba(0,0,0,.2); transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 480px) { .stat-pill-num { font-size: 22px; } .stats-row { gap: 6px; } }
</style>

<div class="save-bar hidden" id="save-bar">

    [921,940,'Venezuela','VEN','\u{1F1FB}\u{1F1EA}'],
    [501,520,'Argentina','ARG','\u{1F1E6}\u{1F1F7}']
  ].sort(function(a,b){ return a[2].localeCompare(b[2]); });

  function expandRanges(str) {
    var s = new Set();
    str.split(',').forEach(function(p) {
      if (p.indexOf('-') > -1) {
        var parts = p.split('-'); var a = +parts[0]; var b = +parts[1];
        for (var i=a; i<=b; i++) s.add(i);
      } else { s.add(+p); }
    });
    return s;
  }

  function parseDups(str) {
    var d = {};
    str.split(',').forEach(function(item) {
      var p = item.split(':'); d[+p[0]] = +p[1];
    });
    return d;
  }

  function getSection(n) {
    for (var i=0; i<SECTIONS.length; i++) {
      if (n >= SECTIONS[i][0] && n <= SECTIONS[i][1]) return SECTIONS[i];
    }
    return [n, n, 'Unknown', '?', '?'];
  }

  var owned = expandRanges(OWNED_STR);
  var dupsBase = parseDups(DUPS_STR);
  var gotSet = new Set();
  var tradedSet = new Set();
  var missingNums = [];
  var dupNums = [];

  function recompute() {
    missingNums = [];
    for (var i=1; i<=TOTAL; i++) if (!owned.has(i)) missingNums.push(i);
    dupNums = Object.keys(dupsBase).map(Number).sort(function(a,b){return a-b;});
  }
  recompute();

  function updateStats() {
    var totalMiss = missingNums.length - gotSet.size;
    var totalDupCopies = Object.values(dupsBase).reduce(function(a,b){return a+b;},0) - tradedSet.size;
    var activeDupNums = dupNums.filter(function(n){return !tradedSet.has(n);}).length;
    var pct = Math.round((owned.size + gotSet.size) / TOTAL * 100);
    document.getElementById('s-owned').textContent = owned.size + gotSet.size;
    document.getElementById('s-missing').textContent = totalMiss;
    document.getElementById('s-dups').textContent = totalDupCopies;
    document.getElementById('prog').style.width = pct + '%';
    document.getElementById('tab-miss-cnt').textContent = totalMiss;
    document.getElementById('tab-dup-cnt').textContent = activeDupNums;
    var pending = gotSet.size + tradedSet.size;
    var bar = document.getElementById('save-bar');
    if (pending > 0) {
      bar.classList.remove('hidden');
      document.getElementById('pending-label').textContent = pending + ' change' + (pending>1?'s':'') + ' pending';
    } else {
      bar.classList.add('hidden');
    }
  }

  function groupBySection(numArr) {
    var map = {};
    var order = [];
    numArr.forEach(function(n) {
      var sec = getSection(n);
      var key = sec[2];
      if (!map[key]) { map[key] = { sec: sec, list: [] }; order.push(key); }
      map[key].list.push(n);
    });
    return order.sort(function(a,b){return a.localeCompare(b);}).map(function(k){return map[k];});
  }

  function makeChip(n, type, sec) {
    var pos = String(n - sec[0] + 1).padStart(2,'0');
    var chip = document.createElement('div');
    if (type === 'miss') {
      chip.className = 'sticker-chip miss' + (gotSet.has(n) ? ' got' : '');
      chip.textContent = sec[3] + ' ' + pos;
      chip.addEventListener('click', function(){ toggleGot(this, n, sec); });
    } else {
      var copies = (dupsBase[n] || 0) + 1;
      var traded = tradedSet.has(n);
      chip.className = 'sticker-chip dup' + (traded ? ' traded' : '');
      chip.textContent = sec[3] + ' ' + pos;
      if (!traded) {
        var badge = document.createElement('span');
        badge.className = 'dup-badge';
        badge.textContent = 'x' + copies;
        chip.appendChild(badge);
      }
      chip.addEventListener('click', function(){ toggleTraded(this, n, sec); });
    }
    return chip;
  }

  function buildSection(container, groups, type) {
    container.innerHTML = '';
    if (!groups.length) {
      container.innerHTML = '<div class="no-results"><span class="emoji">' + (type==='miss'?'🎉':'🤝') + '</span>Nothing here!</div>';
      return;
    }
    groups.forEach(function(g) {
      var sec = g.sec; var numList = g.list;
      var sStart=sec[0], sEnd=sec[1], sName=sec[2], sCode=sec[3], sFlag=sec[4];
      var secTotal = sEnd - sStart + 1;
      var ownedCount = 0;
      for (var i=sStart; i<=sEnd; i++) if (owned.has(i)) ownedCount++;

      var card = document.createElement('div');
      card.className = 'country-card';
      card.dataset.country = sName.toLowerCase();

      var isComplete, pillCls, pillTxt;
      if (type === 'miss') {
        isComplete = numList.every(function(n){return gotSet.has(n);});
        pillCls = isComplete ? 'done' : 'miss';
        pillTxt = isComplete ? 'Complete!' : numList.filter(function(n){return !gotSet.has(n);}).length + ' missing';
      } else {
        isComplete = numList.every(function(n){return tradedSet.has(n);});
        pillCls = isComplete ? 'done' : 'dup';
        pillTxt = isComplete ? 'All traded!' : numList.filter(function(n){return !tradedSet.has(n);}).length + ' available';
      }

      var head = document.createElement('div');
      head.className = 'country-head';
      head.innerHTML = '<span class="country-flag">' + sFlag + '</span>' +
        '<div class="country-info"><div class="country-name-text">' + sName + '</div>' +
        '<div class="country-code-text">' + sCode + ' &middot; ' + ownedCount + '/' + secTotal + ' owned</div></div>' +
        '<span class="country-pill ' + pillCls + '" data-pill>' + pillTxt + '</span>' +
        '<span class="country-chevron">&#9660;</span>';
      head.addEventListener('click', function() { card.classList.toggle('open'); });

      var body = document.createElement('div');
      body.className = 'country-body';
      var grid = document.createElement('div');
      grid.className = 'chip-grid';
      numList.forEach(function(n) { grid.appendChild(makeChip(n, type, sec)); });
      body.appendChild(grid);

      card.appendChild(head);
      card.appendChild(body);
      container.appendChild(card);
    });
  }

  function rebuildAll() {
    buildSection(document.getElementById('sections-missing'), groupBySection(missingNums), 'miss');
    buildSection(document.getElementById('sections-dups'), groupBySection(dupNums), 'dup');
    updateStats();
    applyFilter();
  }

  function updatePill(chip, type) {
    var card = chip.closest('.country-card');
    var pill = card.querySelector('[data-pill]');
    var chips = Array.from(card.querySelectorAll('.sticker-chip'));
    if (type === 'miss') {
      var notGot = chips.filter(function(c){return !c.classList.contains('got');}).length;
      pill.className = 'country-pill ' + (notGot===0 ? 'done' : 'miss');
      pill.textContent = notGot===0 ? 'Complete!' : notGot + ' missing';
    } else {
      var notTraded = chips.filter(function(c){return !c.classList.contains('traded');}).length;
      pill.className = 'country-pill ' + (notTraded===0 ? 'done' : 'dup');
      pill.textContent = notTraded===0 ? 'All traded!' : notTraded + ' available';
    }
  }

  function toggleGot(chip, n, sec) {
    if (gotSet.has(n)) { gotSet.delete(n); chip.classList.remove('got'); }
    else { gotSet.add(n); chip.classList.add('got'); }
    updatePill(chip, 'miss');
    updateStats();
  }

  function toggleTraded(chip, n, sec) {
    if (tradedSet.has(n)) {
      tradedSet.delete(n); chip.classList.remove('traded');
      var copies = (dupsBase[n]||0) + 1;
      if (!chip.querySelector('.dup-badge')) {
        var b = document.createElement('span');
        b.className = 'dup-badge'; b.textContent = 'x' + copies;
        chip.appendChild(b);
      }
    } else {
      tradedSet.add(n); chip.classList.add('traded');
      var b2 = chip.querySelector('.dup-badge');
      if (b2) b2.remove();
    }
    updatePill(chip, 'dup');
    updateStats();
  }

  // Expose globals for inline HTML handlers
  window.applyFilter = function() {
    var val = document.getElementById('filter-input').value.toLowerCase().trim();
    Array.from(document.querySelectorAll('.country-card')).forEach(function(c) {
      c.style.display = (!val || c.dataset.country.indexOf(val) > -1) ? '' : 'none';
    });
  };
  window.clearFilter = function() {
    document.getElementById('filter-input').value = '';
    window.applyFilter();
  };
  function applyFilter() { window.applyFilter(); }

  window.confirmChanges = function() {
    gotSet.forEach(function(n){ owned.add(n); });
    tradedSet.forEach(function(n){ delete dupsBase[n]; });
    gotSet.clear(); tradedSet.clear();
    recompute(); rebuildAll();
    showToast('Changes saved!');
  };
  window.discardChanges = function() {
    gotSet.clear(); tradedSet.clear();
    recompute(); rebuildAll();
    showToast('Changes discarded');
  };

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }

  // Tabs
  var currentTab = 'missing';
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('panel-missing').style.display = tab==='missing' ? 'block' : 'none';
    document.getElementById('panel-dups').style.display    = tab==='dups'    ? 'block' : 'none';
    Array.from(document.querySelectorAll('.tab-btn')).forEach(function(b){ b.classList.remove('active'); });
    document.querySelector(tab==='missing' ? '.tab-btn.miss' : '.tab-btn.dups').classList.add('active');
    history.replaceState(null, '', '#' + tab);
  }

  document.querySelector('.tab-btn.miss').addEventListener('click', function(){ switchTab('missing'); });
  document.querySelector('.tab-btn.dups').addEventListener('click', function(){ switchTab('dups'); });

  document.getElementById('panel-missing').style.display = 'block';
  document.getElementById('panel-dups').style.display    = 'none';

  rebuildAll();

  if (window.location.hash === '#dups') switchTab('dups');

})();
</script>
</body>
</html>
