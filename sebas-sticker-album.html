<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚽ Sebas Sticker Album · FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f0f4ff;
    --bg2: #e6ecff;
    --card: #ffffff;
    --card2: #f7f9ff;
    --border: #d0daf5;
    --border-bright: #a8b8e8;
    --blue: #1a6bff;
    --blue-light: rgba(26,107,255,0.12);
    --blue-glow: rgba(26,107,255,0.2);
    --green: #00a855;
    --green-dark: #007a3d;
    --green-light: rgba(0,168,85,0.1);
    --green-glow: rgba(0,168,85,0.2);
    --orange: #e85d00;
    --orange-glow: rgba(232,93,0,0.2);
    --gold: #b07d00;
    --gold-light: rgba(176,125,0,0.1);
    --gold-glow: rgba(176,125,0,0.2);
    --red: #e4002b;
    --red-light: rgba(228,0,43,0.09);
    --red-glow: rgba(228,0,43,0.15);
    --text: #0d1640;
    --text-muted: #4a5c99;
    --text-subtle: #8899cc;
    --radius: 14px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 90% 40% at 50% -5%, rgba(26,107,255,0.08) 0%, transparent 55%),
      radial-gradient(ellipse 50% 30% at 5% 90%, rgba(0,168,85,0.05) 0%, transparent 50%),
      radial-gradient(ellipse 50% 30% at 95% 60%, rgba(228,0,43,0.04) 0%, transparent 50%);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(160deg, #1a3a9f 0%, #0d2270 50%, #07154a 100%);
    border-bottom: 3px solid #0a1d8a;
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #e4002b, #ff9900, #ffd600, #00c060, #1a6bff);
  }
  .header-eyebrow {
    font-size: 11px; font-weight: 800;
    letter-spacing: .25em; text-transform: uppercase;
    color: rgba(180,210,255,0.9); margin-bottom: 8px;
  }
  .header-ball {
    font-size: 52px; display: block; margin-bottom: 4px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-14px) rotate(5deg)} }
  .header-title {
    font-family: 'Bangers', sans-serif;
    font-size: clamp(42px, 11vw, 72px);
    letter-spacing: 4px; line-height: 1;
    margin-bottom: 2px; color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,80,0.5), 0 0 30px rgba(100,160,255,0.4);
  }
  .header-title .name { color: #7ec8ff; }
  .header-sub {
    font-size: 11px; font-weight: 800;
    letter-spacing: .2em; text-transform: uppercase;
    color: #ffd166; margin-bottom: 20px; opacity: .9;
  }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .stat-pill {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 12px; padding: 10px 18px;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(8px);
  }
  .stat-pill-num {
    font-family: 'Bangers', sans-serif; font-size: 30px; line-height: 1;
  }
  .stat-pill.owned .stat-pill-num { color: #6affb2; }
  .stat-pill.missing .stat-pill-num { color: #ff8099; }
  .stat-pill.trade .stat-pill-num { color: #ffd166; }
  .stat-pill-lbl { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; color: rgba(200,220,255,0.8); }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin: 18px 20px 0; }
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label-text { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: rgba(180,210,255,0.8); }
  .progress-label-pct { font-family: 'Bangers', sans-serif; font-size: 18px; color: #7ec8ff; }
  .progress-outer {
    background: rgba(0,0,0,0.2); border-radius: 6px; height: 12px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(90deg, #e4002b, #ff9900, #ffd600, #00c060, #1a6bff);
    border-radius: 6px;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;
  }
  .progress-inner::after {
    content: '';
    position: absolute; top: 0; left: -50%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{left:-50%} 100%{left:150%} }

  /* ── TABS ── */
  .tabs-wrap { display: flex; gap: 10px; padding: 16px 16px 0; }
  .tab-btn {
    flex: 1;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
    padding: 12px 16px; border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--card); color: var(--text-muted);
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    text-transform: uppercase; letter-spacing: .05em;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .tab-btn.miss.active {
    background: linear-gradient(135deg, #c0003b, #e4002b);
    border-color: var(--red); color: #fff;
    box-shadow: 0 4px 16px var(--red-glow);
  }
  .tab-btn.dups.active {
    background: linear-gradient(135deg, #8a6000, #c28b00);
    border-color: #c28b00; color: #fff;
    box-shadow: 0 4px 16px var(--gold-glow);
  }
  .tab-btn:not(.active):hover { border-color: var(--border-bright); color: var(--text); }
  .tab-btn .tab-count {
    background: rgba(0,0,0,.1); border-radius: 6px;
    padding: 2px 8px; font-size: 11px; font-weight: 900;
  }
  .tab-btn.miss.active .tab-count,
  .tab-btn.dups.active .tab-count { background: rgba(255,255,255,.2); }

  /* ── FILTER BAR ── */
  .filter-bar { padding: 12px 16px 0; display: flex; gap: 8px; align-items: center; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--card);
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--text); outline: none;
    transition: border-color .2s, box-shadow .2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .search-wrap input::placeholder { color: var(--text-subtle); }
  .search-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .search-wrap .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; opacity: .45; }
  .filter-clear {
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
    padding: 11px 16px; border-radius: 10px;
    border: 2px solid var(--border); background: var(--card);
    color: var(--text-muted); cursor: pointer; transition: all .15s; text-transform: uppercase;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .filter-clear:hover { border-color: var(--red); color: var(--red); }

  /* ── SAVE BAR ── */
  .save-bar { padding: 10px 16px 0; display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
  .save-btn {
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
    padding: 10px 18px; border-radius: 10px; cursor: pointer;
    border: 2px solid transparent;
    display: flex; align-items: center; gap: 6px;
    transition: all .15s; text-transform: uppercase; letter-spacing: .05em;
  }
  .save-btn.confirm {
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    color: #fff; box-shadow: 0 4px 12px var(--green-glow);
  }
  .save-btn.confirm:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .save-btn.discard { background: var(--card); color: var(--text-muted); border-color: var(--border); }
  .save-btn.discard:hover { border-color: var(--red); color: var(--red); }
  .pending-label {
    font-size: 12px; font-weight: 800; color: var(--gold); align-self: center;
    background: var(--gold-light); padding: 5px 12px; border-radius: 6px;
    border: 1px solid rgba(176,125,0,0.25);
  }
  .save-bar.hidden { display: none; }

  /* ── CONTENT & CARDS ── */
  .content { padding: 14px 16px 80px; }
  .panel { display: none; } .panel.active { display: block; }

  .country-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    margin-bottom: 8px; overflow: hidden;
    transition: border-color .2s, box-shadow .2s, transform .15s;
    box-shadow: 0 2px 8px rgba(13,22,64,0.06);
  }
  .country-card:hover {
    border-color: var(--border-bright);
    box-shadow: 0 6px 20px rgba(13,22,64,0.12);
    transform: translateY(-1px);
  }
  .country-head {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; cursor: pointer; user-select: none;
  }
  .country-flag { font-size: 26px; flex-shrink: 0; line-height: 1; }
  .country-flag-img {
    width: 36px; height: 27px;
    border-radius: 4px; object-fit: cover; flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    border: 1px solid rgba(0,0,0,0.08);
  }
  .country-info { flex: 1; min-width: 0; }
  .country-name-text { font-weight: 900; font-size: 14px; color: var(--text); }
  .country-code-text { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: .07em; margin-top: 1px; }
  .country-pill {
    font-size: 11px; font-weight: 900; padding: 4px 10px;
    border-radius: 6px; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: .05em;
    border: 1px solid transparent;
  }
  .country-pill.miss { background: var(--red-light); color: var(--red); border-color: rgba(228,0,43,0.25); }
  .country-pill.dup  { background: var(--gold-light); color: var(--gold); border-color: rgba(176,125,0,0.25); }
  .country-pill.done {
    background: var(--green-light); color: var(--green-dark);
    border-color: rgba(0,168,85,0.35);
    animation: pulse-done 2s ease-in-out infinite;
  }
  @keyframes pulse-done { 0%,100%{box-shadow:0 0 0 0 var(--green-glow)} 50%{box-shadow:0 0 0 4px rgba(0,168,85,0.1)} }
  .country-chevron { font-size: 12px; transition: transform .25s; flex-shrink: 0; opacity: .4; color: var(--blue); }
  .country-card.open .country-chevron { transform: rotate(180deg); opacity: .8; }
  .country-body {
    display: none; padding: 6px 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--card2);
  }
  .country-card.open .country-body { display: block; }

  /* ── STICKER CHIPS ── */
  .chip-grid { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 12px; }
  .sticker-chip {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 900;
    padding: 7px 11px; cursor: pointer; position: relative;
    border: 2px solid transparent;
    transition: transform .15s, box-shadow .15s, background .15s, border-color .15s;
    user-select: none; text-transform: uppercase; letter-spacing: .05em;
    font-family: 'Nunito', sans-serif;
  }
  .sticker-chip:hover { transform: scale(1.1) translateY(-2px); }
  .sticker-chip:active { transform: scale(.95); }
  .sticker-chip.miss {
    background: var(--red-light); color: var(--red);
    border-color: rgba(228,0,43,0.3);
    box-shadow: 0 2px 6px rgba(228,0,43,0.1);
  }
  .sticker-chip.miss:hover { box-shadow: 0 4px 14px rgba(228,0,43,0.25); }
  .sticker-chip.miss.got {
    background: var(--green-light); color: var(--green-dark);
    border-color: var(--green); box-shadow: 0 2px 10px var(--green-glow);
  }
  .sticker-chip.miss.got::after {
    content: '✓'; position: absolute; top: -7px; right: -7px;
    background: var(--green); color: #fff; border-radius: 50%;
    width: 16px; height: 16px; font-size: 9px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--card);
  }
  .sticker-chip.dup {
    background: var(--gold-light); color: var(--gold);
    border-color: rgba(176,125,0,0.3);
    box-shadow: 0 2px 6px rgba(176,125,0,0.1);
  }
  .sticker-chip.dup:hover { box-shadow: 0 4px 14px var(--gold-glow); }
  .sticker-chip.dup.traded {
    background: #f0f2f8; color: var(--text-subtle);
    border-color: var(--border); box-shadow: none;
  }
  .sticker-chip.dup.traded::after {
    content: '✕'; position: absolute; top: -7px; right: -7px;
    background: var(--text-subtle); color: #fff; border-radius: 50%;
    width: 16px; height: 16px; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--card);
  }
  .dup-badge {
    position: absolute; top: -8px; right: -8px;
    background: linear-gradient(135deg, var(--orange), #ff9900);
    color: #fff; border-radius: 5px; font-size: 9px; font-weight: 900;
    padding: 1px 5px; border: 2px solid var(--card); line-height: 1.4;
  }
  .sticker-chip.traded .dup-badge { display: none; }

  /* ── EMPTY STATES ── */
  .no-results {
    text-align: center; padding: 56px 20px;
    color: var(--text-muted); font-size: 16px; font-weight: 800;
  }
  .no-results .emoji { font-size: 56px; display: block; margin-bottom: 12px; }
  .no-results .msg { color: var(--text-subtle); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff; padding: 12px 24px; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
    box-shadow: 0 8px 24px rgba(13,22,64,.25);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .stat-pill-num { font-size: 26px; }
    .stats-row { gap: 6px; }
    .header-title { font-size: clamp(38px, 12vw, 56px); }
  }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 24px; right: 20px; z-index: 90;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #1a6bff, #0044cc);
    color: #fff; font-size: 28px; font-weight: 300;
    border: none; cursor: pointer;
    box-shadow: 0 6px 20px rgba(26,107,255,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, box-shadow .15s;
    line-height: 1;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 8px 28px rgba(26,107,255,0.55); }
  .fab:active { transform: scale(.93); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(7,21,74,0.55); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--card); border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px; width: 100%; max-width: 480px;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 -8px 40px rgba(13,22,64,0.2);
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 18px;
  }
  .modal-title {
    font-family: 'Bangers', sans-serif; font-size: 22px;
    letter-spacing: 1px; color: var(--text); margin-bottom: 18px; text-align: center;
  }
  .modal-type-row {
    display: flex; gap: 10px; margin-bottom: 18px;
  }
  .modal-type-btn {
    flex: 1; padding: 12px; border-radius: 10px;
    border: 2px solid var(--border); background: var(--card);
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
    cursor: pointer; transition: all .15s; text-align: center;
    text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted);
  }
  .modal-type-btn.active.miss {
    background: var(--red-light); border-color: var(--red); color: var(--red);
  }
  .modal-type-btn.active.dup {
    background: var(--gold-light); border-color: #c28b00; color: var(--gold);
  }
  .modal-field { margin-bottom: 14px; }
  .modal-label {
    font-size: 11px; font-weight: 900; text-transform: uppercase;
    letter-spacing: .1em; color: var(--text-muted); margin-bottom: 6px; display: block;
  }
  .modal-input {
    width: 100%; padding: 13px 16px;
    border: 2px solid var(--border); border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
    color: var(--text); outline: none; background: var(--card);
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  .modal-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .modal-input.err { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); }
  .modal-copies-row { display: flex; gap: 10px; align-items: center; }
  .modal-copies-row .modal-input { flex: 1; }
  .modal-err {
    font-size: 12px; font-weight: 800; color: var(--red);
    margin-top: 6px; min-height: 18px;
  }
  .modal-submit {
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #1a6bff, #0044cc);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 900; cursor: pointer;
    margin-top: 6px; letter-spacing: .05em; text-transform: uppercase;
    box-shadow: 0 4px 16px rgba(26,107,255,0.35);
    transition: filter .15s, transform .15s;
  }
  .modal-submit:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .modal-submit:active { transform: scale(.97); }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">⚽ FIFA World Cup 2026™ · Panini</div>
  <span class="header-ball">🏆</span>
  <div class="header-title"><span class="name">Sebas</span> Album</div>
  <div class="header-sub">Sticker Collection · WC 2026</div>
  <div class="stats-row">
    <div class="stat-pill owned">
      <span class="stat-pill-num" id="s-owned">–</span>
      <span class="stat-pill-lbl">✅ Got it</span>
    </div>
    <div class="stat-pill missing">
      <span class="stat-pill-num" id="s-missing">–</span>
      <span class="stat-pill-lbl">🔥 Need it</span>
    </div>
    <div class="stat-pill trade">
      <span class="stat-pill-num" id="s-dups">–</span>
      <span class="stat-pill-lbl">🔁 Trade</span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span class="progress-label-text">⚡ Album Progress</span>
      <span class="progress-label-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-outer">
      <div class="progress-inner" id="prog" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="tabs-wrap">
  <button class="tab-btn miss active">
    ❌ Missing <span class="tab-count" id="tab-miss-cnt">–</span>
  </button>
  <button class="tab-btn dups">
    🔁 Duplicates <span class="tab-count" id="tab-dup-cnt">–</span>
  </button>
</div>

<div class="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="filter-input" placeholder="Filter by country…" oninput="applyFilter()"/>
  </div>
  <button class="filter-clear" onclick="clearFilter()">✕ Clear</button>
</div>

<div class="save-bar hidden" id="save-bar">
  <span class="pending-label" id="pending-label"></span>
  <button class="save-btn discard" onclick="discardChanges()">↩ Undo all</button>
  <button class="save-btn confirm" onclick="confirmChanges()">✓ Save changes</button>
</div>

  function expandRanges(str) {
    var s = new Set();
    str.split(',').forEach(function(p) {
      if (p.indexOf('-') > -1) {
        var parts = p.split('-'); var a = +parts[0]; var b = +parts[1];
        for (var i=a; i<=b; i++) s.add(i);
      } else { s.add(+p); }
    });
    return s;
  }

  function parseDups(str) {
    var d = {};
    str.split(',').forEach(function(item) {
      var p = item.split(':'); d[+p[0]] = +p[1];
    });
    return d;
  }

  function getSection(n) {
    for (var i=0; i<SECTIONS.length; i++) {
      if (n >= SECTIONS[i][0] && n <= SECTIONS[i][1]) return SECTIONS[i];
    }
    return [n, n, 'Unknown', '?', '?'];
  }

  var gotSet = new Set();

  function recompute() {
    missingNums = [];
    for (var i=0; i<TOTAL; i++) if (!owned.has(i)) missingNums.push(i);
    dupNums = Object.keys(dupsBase).map(Number).sort(function(a,b){return a-b;});
  }
  recompute();

  function totalTradedCount() {
    return Object.values(tradedCounts).reduce(function(a,b){return a+b;},0);
  }

  function updateStats() {
    var totalDupCopies = Object.keys(dupsBase).reduce(function(sum, k) {
      var remaining = dupsBase[+k] - (tradedCounts[+k] || 0);
      return sum + Math.max(0, remaining);
    }, 0);
    var activeDupNums = dupNums.filter(function(n){
      return (dupsBase[n] - (tradedCounts[n] || 0)) > 0;
    }).length;
    var totalMiss = missingNums.length - gotSet.size;
    var pct = Math.round((owned.size + gotSet.size) / TOTAL * 100);
    document.getElementById('s-owned').textContent = owned.size + gotSet.size;
    document.getElementById('s-missing').textContent = totalMiss;
    document.getElementById('s-dups').textContent = totalDupCopies;
    document.getElementById('prog').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('tab-miss-cnt').textContent = totalMiss;
    document.getElementById('tab-dup-cnt').textContent = activeDupNums;

    var bar = document.getElementById('save-bar');
    if (pending > 0) {
      bar.classList.remove('hidden');
      document.getElementById('pending-label').textContent = pending + ' change' + (pending>1?'s':'') + ' pending';
    } else {
      bar.classList.add('hidden');
    }
  }

  function groupBySection(numArr) {
    var map = {};
    var order = [];
    numArr.forEach(function(n) {
      var sec = getSection(n);
      var key = sec[2];
      if (!map[key]) { map[key] = { sec: sec, list: [] }; order.push(key); }
      map[key].list.push(n);
    });
    return order.sort(function(a,b){
      var ac=map[a].sec[3], bc=map[b].sec[3];
      if(ac==='FWC') return -1; if(bc==='FWC') return 1;
      if(ac==='CC') return -1; if(bc==='CC') return 1;
      return a.localeCompare(b);
    }).map(function(k){return map[k];});
  }

  function makeChip(n, type, sec) {
    var pos = String(n - sec[0] + (sec[0] === 0 ? 0 : 1)).padStart(2,'0');
    var chip = document.createElement('div');
    if (type === 'miss') {
      chip.className = 'sticker-chip miss' + (gotSet.has(n) ? ' got' : '');
      chip.textContent = sec[3] + ' ' + pos;
      chip.addEventListener('click', function(){ toggleGot(this, n, sec); });
    } else {
      var remaining = (dupsBase[n] || 0) - (tradedCounts[n] || 0);
      chip.className = 'sticker-chip dup' + (remaining === 0 ? ' traded' : '');
      chip.textContent = sec[3] + ' ' + pos;
      if (remaining > 0) {
        var badge = document.createElement('span');
        badge.className = 'dup-badge';
        badge.textContent = 'x' + remaining;
        chip.appendChild(badge);
      }
      chip.addEventListener('click', function(){ toggleTraded(this, n, sec); });
    }
    return chip;
  }

  function buildSection(container, groups, type) {
    container.innerHTML = '';
    if (!groups.length) {
      container.innerHTML = '<div class="no-results"><span class="emoji">' + (type==='miss'?'🎉':'🤝') + '</span>Nothing here!</div>';
      return;
    }
    groups.forEach(function(g) {
      var sec = g.sec; var numList = g.list;
      var sStart=sec[0], sEnd=sec[1], sName=sec[2], sCode=sec[3], sFlag=sec[4];

      var card = document.createElement('div');
      card.className = 'country-card';
      card.dataset.country = sName.toLowerCase();

      var isComplete, pillCls, pillTxt;
      if (type === 'miss') {
        isComplete = numList.every(function(n){return gotSet.has(n);});
        pillCls = isComplete ? 'done' : 'miss';
        pillTxt = isComplete ? 'Complete!' : numList.filter(function(n){return !gotSet.has(n);}).length + ' missing';
      } else {
        isComplete = numList.every(function(n){return (dupsBase[n] - (tradedCounts[n]||0)) === 0;});
        pillCls = isComplete ? 'done' : 'dup';
        pillTxt = isComplete ? 'All traded!' : numList.filter(function(n){return (dupsBase[n]-(tradedCounts[n]||0))>0;}).length + ' available';
      }

      var head = document.createElement('div');
      head.className = 'country-head';

      var flagEl = document.createElement('span');
      flagEl.className = 'country-flag';
      flagEl.textContent = sFlag;

      var info = document.createElement('div');
      info.className = 'country-info';
      var nameEl = document.createElement('div');
      nameEl.className = 'country-name-text';
      nameEl.textContent = sName;
      var codeEl = document.createElement('div');
      codeEl.className = 'country-code-text';
      codeEl.textContent = sCode + ' · ' + numList.length + (type==='miss'?' stickers':' duplicates');
      info.appendChild(nameEl);
      info.appendChild(codeEl);

      var pill = document.createElement('div');
      pill.className = 'country-pill ' + pillCls;
      pill.textContent = pillTxt;
      pill.id = 'pill-' + type + '-' + sCode;

      var chev = document.createElement('span');
      chev.className = 'country-chevron';
      chev.textContent = '▼';

      head.appendChild(flagEl);
      head.appendChild(info);
      head.appendChild(pill);
      head.appendChild(chev);

      var body = document.createElement('div');
      body.className = 'country-body';
      var chipGrid = document.createElement('div');
      chipGrid.className = 'chip-grid';
      numList.forEach(function(n){ chipGrid.appendChild(makeChip(n, type, sec)); });
      body.appendChild(chipGrid);

      head.addEventListener('click', function(){
        card.classList.toggle('open');
      });

      card.appendChild(head);
      card.appendChild(body);
      container.appendChild(card);
    });
  }

  function updateSectionPill(chip, n, type, sec) {
    var sCode = sec[3];
    var pill = document.getElementById('pill-' + type + '-' + sCode);
    if (!pill) return;
    var card = chip.closest('.country-card');
    var chips = card ? card.querySelectorAll('.sticker-chip') : [];
    var numList = Array.from(chips).map(function(c){ return +c.dataset.n; }).filter(function(x){return !isNaN(x);});
    // fallback: just update pill text
    if (type === 'miss') {
      var remaining = Array.from(card.querySelectorAll('.sticker-chip.miss:not(.got)')).length;
      var isComplete = remaining === 0;
      pill.className = 'country-pill ' + (isComplete ? 'done' : 'miss');
      pill.textContent = isComplete ? 'Complete!' : remaining + ' missing';
    } else {
      var available = Array.from(card.querySelectorAll('.sticker-chip.dup:not(.traded)')).length;
      var isComplete = available === 0;
      pill.className = 'country-pill ' + (isComplete ? 'done' : 'dup');
      pill.textContent = isComplete ? 'All traded!' : available + ' available';
    }
  }

  function toggleGot(chip, n, sec) {
    if (gotSet.has(n)) {
      gotSet.delete(n);
      chip.classList.remove('got');
      showToast('Removed ' + sec[3] + ' from got list');
    } else {
      gotSet.add(n);
      chip.classList.add('got');
      showToast('Got ' + sec[3] + '!');
    }
    updateStats();
    updateSectionPill(chip, n, 'miss', sec);
  }

  function toggleTraded(chip, n, sec) {
    var base = dupsBase[n] || 0;
    var traded = tradedCounts[n] || 0;
    var remaining = base - traded;
    if (remaining > 0) {
      // decrement: mark one as traded
      tradedCounts[n] = traded + 1;
      remaining--;
      var badge = chip.querySelector('.dup-badge');
      if (remaining === 0) {
        chip.classList.add('traded');
        if (badge) badge.remove();
        showToast('All ' + sec[3] + ' duplicates traded!');
      } else {
        if (badge) badge.textContent = 'x' + remaining;
        showToast('Traded 1 · ' + remaining + ' left');
      }
    } else {
      // undo: add one back
      tradedCounts[n] = Math.max(0, traded - 1);
      remaining = base - tradedCounts[n];
      chip.classList.remove('traded');
      var badge = chip.querySelector('.dup-badge');
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'dup-badge';
        chip.appendChild(badge);
      }
      badge.textContent = 'x' + remaining;
      showToast('Undo · ' + remaining + ' available');
    }
    updateStats();
    updateSectionPill(chip, n, 'dups', sec);
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }

  function confirmChanges() {
    gotSet.forEach(function(n){ owned.add(n); });
    gotSet.clear();
    Object.keys(tradedCounts).forEach(function(k) {
      var n = +k;
      dupsBase[n] -= tradedCounts[n];
      if (dupsBase[n] <= 0) delete dupsBase[n];
    });
    tradedCounts = {};
    recompute();
    renderAll();
    updateStats();
    showToast('✅ Changes saved!');
  }

  function discardChanges() {
    gotSet.clear();
    tradedCounts = {};
    renderAll();
    updateStats();
    showToast('↩ Changes discarded');
  }

  var activeTab = 'miss';
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('panel-missing').classList.toggle('active', tab==='miss');

    document.querySelectorAll('.tab-btn').forEach(function(b, i){
      b.classList.toggle('active', (i===0 && tab==='miss') || (i===1 && tab==='dups'));

    var q = document.getElementById('filter-input').value.trim().toLowerCase();
    document.querySelectorAll('.country-card').forEach(function(card){
      var match = !q || card.dataset.country.includes(q);
      card.style.display = match ? '' : 'none';
    });
  }

  function clearFilter() {
    document.getElementById('filter-input').value = '';
    applyFilter();
  }

  function renderAll() {
    var missingGroups = groupBySection(missingNums);
    buildSection(document.getElementById('sections-missing'), missingGroups, 'miss');

    var activeDups = dupNums.filter(function(n){
      return (dupsBase[n] - (tradedCounts[n]||0)) > 0;
    });
    var dupGroups = groupBySection(activeDups);
    buildSection(document.getElementById('sections-dups'), dupGroups, 'dups');
  }

  document.querySelectorAll('.tab-btn').forEach(function(btn, idx){
    btn.addEventListener('click', function(){ switchTab(idx===0?'miss':'dups'); });

  function adjCopies(delta) {
    var el = document.getElementById('m-copies');
    el.value = Math.max(1, Math.min(10, (+el.value || 1) + delta));
  }

  function submitSticker() {
    var numEl = document.getElementById('m-num');
    var errEl = document.getElementById('m-err');
    var n = parseInt(numEl.value, 10);
    errEl.textContent = '';
    numEl.classList.remove('err');

    if (isNaN(n) || n < 0 || n >= TOTAL) {
      errEl.textContent = 'Enter a valid sticker number (0–' + (TOTAL-1) + ')';
      numEl.classList.add('err');
      return;
    }

    if (modalType === 'miss') {
      if (!owned.has(n)) {
        errEl.textContent = 'Sticker ' + n + ' is already in the missing list.';
        numEl.classList.add('err');
        return;
      }
      owned.delete(n);
      recompute();
      renderAll();
      updateStats();
      closeModal();
      showToast('Added #' + n + ' to missing');
    } else {
      var copies = Math.max(1, parseInt(document.getElementById('m-copies').value, 10) || 1);
      if (dupsBase[n]) {
        dupsBase[n] += copies;
      } else {
        dupsBase[n] = copies;
      }
      recompute();
      renderAll();
      updateStats();
      closeModal();
      showToast('Added #' + n + ' as duplicate (x' + (dupsBase[n]) + ')');
    }
  }

  // Allow Enter key in number input
  document.getElementById('m-num').addEventListener('keydown', function(e){
    if (e.key === 'Enter') submitSticker();
  });

  renderAll();
  updateStats();

})();
</script>

<button class="fab" id="fab-btn" title="Add sticker">＋</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Add Sticker</div>
    <div class="modal-type-row">
      <button class="modal-type-btn miss active" id="mtype-miss" onclick="setModalType('miss')">❌ Missing</button>
      <button class="modal-type-btn dup" id="mtype-dup" onclick="setModalType('dup')">🔁 Duplicate</button>
    </div>
    <div class="modal-field">
      <label class="modal-label" for="m-num">Sticker number</label>
      <input class="modal-input" id="m-num" type="number" min="0" max="994" placeholder="e.g. 42" inputmode="numeric"/>
    </div>
    <div class="modal-field" id="m-copies-field" style="display:none">
      <label class="modal-label">Extra copies (duplicates)</label>
      <div class="modal-copies-row">
        <button class="modal-type-btn" style="flex:0;padding:12px 18px;font-size:20px" onclick="adjCopies(-1)">−</button>
        <input class="modal-input" id="m-copies" type="number" min="1" max="10" value="1" inputmode="numeric" style="text-align:center"/>
        <button class="modal-type-btn" style="flex:0;padding:12px 18px;font-size:20px" onclick="adjCopies(1)">＋</button>
      </div>
    </div>
    <div class="modal-err" id="m-err"></div>
    <button class="modal-submit" onclick="submitSticker()">Add Sticker</button>
  </div>
</div>

</body>
</html>
